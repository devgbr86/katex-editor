<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>KaTeX JS Math Formula Online Editor</title>

     <!-- KaTeX -->
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
     <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

     <!-- Styles -->
     <link rel="stylesheet" href="./assets/css/main.css">
</head>

<body>

     <!-- ── Header ── -->
     <header>
          <div class="title-block">
               <h1><span class="accent">KaTeX</span> JS Math Formula Online Editor</h1>
               <span class="badge">v1.0</span>
          </div>
     </header>

     <!-- ── Main layout ── -->
     <main>

          <!-- Left: Editor panel -->
          <div class="panel">
               <div class="panel-header">
                    <span class="panel-label">// input</span>
                    <div class="toggle-row">
                         <button class="toggle on" id="autoToggle" onclick="toggleAuto()"
                              title="Toggle auto-render"></button>
                         auto-render
                    </div>
               </div>

               <!-- Snippet toolbar -->
               <div class="toolbar">
                    <button onclick="insertSnippet('frac')" title="Fraction">½ frac</button>
                    <button onclick="insertSnippet('sqrt')" title="Square root">√ sqrt</button>
                    <button onclick="insertSnippet('sum')" title="Summation">∑ sum</button>
                    <button onclick="insertSnippet('int')" title="Integral">∫ integral</button>
                    <button onclick="insertSnippet('lim')" title="Limit">lim</button>
                    <button onclick="insertSnippet('deriv')" title="Derivative">d/dx</button>
                    <button onclick="insertSnippet('matrix')" title="Matrix">⊞ matrix</button>
                    <button onclick="insertSnippet('vec')" title="Vector">→ vec</button>
               </div>

               <textarea id="editor" spellcheck="false" autocorrect="off" autocomplete="off"
                    placeholder="Type your formulas here...&#10;&#10;Display block:  $$\frac{a}{b}$$&#10;Inline:         $E = mc^2$">$$x = \frac{-b \pm \sqrt{b^2 - 4ac}}{2a}$$

$$\int_{-\infty}^{\infty} e^{-x^2} dx = \sqrt{\pi}$$

$$\sum_{n=1}^{\infty} \frac{1}{n^2} = \frac{\pi^2}{6}$$</textarea>

               <div class="actions">
                    <button class="btn-primary" onclick="render()">Render</button>
                    <button class="btn-secondary" onclick="exportPDF()">Export PDF</button>
                    <button class="btn-secondary" onclick="clearEditor()">Clear</button>
               </div>
          </div>

          <!-- Right: Preview panel -->
          <div class="panel">
               <div class="panel-header">
                    <span class="panel-label">// preview</span>
               </div>
               <div id="preview">
                    <p class="placeholder">// rendered output will appear here</p>
               </div>
          </div>

     </main>

     <!-- ── Footer ── -->
     <footer>
          <span class="footer-note">
               Powered by <a href="https://katex.org" target="_blank">KaTeX</a> — use <code>$$...$$</code> for block,
               <code>$...$</code> for inline
          </span>
          <span class="footer-note">katex math formula online editor</span>
     </footer>

     <!-- Script -->
     <script src="./assets/js/main.js"></script>
</body>

</html>
